name: Strict CI

# Runs the full strict pre-merge gate (`make strict-gate`) on every PR and on pushes to
# main. Local `make strict-gate` and this job are the SAME command, so they cannot diverge.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: strict-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-gate:
    name: strict-gate
    # This package targets macOS 26 (Tahoe) + Xcode 26 + Swift 6.2. GitHub-hosted `macos-26`
    # went GA on 2026-02-26, runs natively on Apple Silicon (arm64), and ships Xcode 26.x
    # preinstalled (default is 26.x) — so it builds this package directly, no self-hosted
    # runner needed. Pinned to `macos-26` (not `macos-latest`) to hold the OS major explicitly;
    # bump when the target OS moves. The base image includes swiftlint/swiftformat but NOT
    # semgrep/cppcheck/clang-tidy/ffmpeg — the Install-tools step below covers those. ffmpeg is
    # required for coverage, not just convenience: it ships the libavformat headers under
    # /opt/homebrew/include that make FileDecodeSource.mm's __has_include(<libavformat/...>)
    # FFmpeg decode + metadata branch actually parse, so clang-tidy analyzes it here (see
    # strict-gate.sh — CI-with-ffmpeg is the guaranteed coverage for that branch).
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          clang --version

      - name: Install tools (idempotent)
        run: |
          # keg-only llvm provides clang-tidy; ffmpeg supplies the libavformat headers under
          # /opt/homebrew/include so FileDecodeSource.mm's __has_include(<libavformat/...>)
          # FFmpeg decode + metadata branch parses and clang-tidy actually analyzes it here
          # (that branch is analyzed NOWHERE else in the merge path); the rest are
          # formatters/linters/scanners.
          brew install swiftformat swiftlint llvm semgrep cppcheck ffmpeg || true
          # Prepend keg-only LLVM (clang-tidy) + Homebrew bin for later steps, PRESERVING the
          # runner default PATH (/usr/bin, where make lives). A step-level
          # `env: PATH: …:${{ env.PATH }}` does NOT work — the Actions env context has no PATH,
          # so it expanded to empty, dropped /usr/bin, and broke `make` (exit 127).
          echo "/opt/homebrew/opt/llvm/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Run strict gate
        run: make strict-gate
