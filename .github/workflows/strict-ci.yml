name: Strict CI

# Runs the full strict pre-merge gate (`make strict-gate`) on every PR and on pushes to
# main. Local `make strict-gate` and this job are the SAME command, so they cannot diverge.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: strict-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-gate:
    name: strict-gate
    # This package targets macOS 26 (Tahoe) + Xcode 26 + Swift 6.2. GitHub-hosted `macos-26`
    # went GA on 2026-02-26, runs natively on Apple Silicon (arm64), and ships Xcode 26.x
    # preinstalled (default is 26.x) — so it builds this package directly, no self-hosted
    # runner needed. Pinned to `macos-26` (not `macos-latest`) to hold the OS major explicitly;
    # bump when the target OS moves. The base image includes swiftlint/swiftformat but NOT
    # semgrep/cppcheck/clang-tidy — the Install-tools step below covers those.
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          clang --version

      - name: Install tools (idempotent)
        run: |
          # keg-only llvm provides clang-tidy; the rest are formatters/linters/scanners.
          brew install swiftformat swiftlint llvm semgrep cppcheck || true

      - name: Run strict gate
        env:
          # Homebrew keg-only LLVM (clang-tidy) must be on PATH for the tool check.
          PATH: /opt/homebrew/opt/llvm/bin:/opt/homebrew/bin:${{ env.PATH }}
        run: make strict-gate
