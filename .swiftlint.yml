# SwiftLint configuration for AdaptiveSound

disabled_rules:
  - trailing_comma
  - function_name_whitespace
  - implicit_optional_initialization
  # "master" (master gain / master bus) is standard, intentional audio terminology here.
  - inclusive_language

opt_in_rules:
  - force_unwrapping

excluded:
  - .build/
  - .swiftpm/
  - Pods/

cyclomatic_complexity:
  warning: 10
  error: 20

line_length:
  warning: 120
  error: 150

function_parameter_count:
  warning: 5
  error: 8

force_cast: warning
force_try: warning
force_unwrapping: error
