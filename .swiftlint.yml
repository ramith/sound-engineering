---
# SwiftLint configuration for AdaptiveSound

strict: true
only_rules:
  - accessibility_label_for_image
  - array_init
  - attributes
  - balanced_xctest_lifecycle
  - closure_body_length
  - closure_spacing
  - collection_alignment
  - colon
  - comma
  - comment_spacing
  - compiler_protocol_init
  - computed_accessors_order
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - control_statement
  - cyclomatic_complexity
  - deployment_target
  - discarded_notification_center_observer
  - discouraged_assert
  - discouraged_direct_init
  - discouraged_none_name
  - discouraged_object_literal
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - duplicate_enum_cases
  - duplicate_imports
  - duplicated_key_in_dictionary_literal
  - empty_collection_literal
  - empty_count
  - empty_enum_arguments
  - empty_parameters
  - empty_parentheses_with_trailing_closure
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - expiring_todo
  - explicit_acl
  - explicit_enum_raw_value
  - explicit_init
  - explicit_self
  - explicit_type_interface
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - file_length
  - file_name
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - for_where
  - force_cast
  - force_try
  - force_unwrapping
  - function_body_length
  - function_default_parameter_at_end
  - function_parameter_count
  - generic_type_name
  - grouped_import
  - hardcoded_string_literal
  - identical_operands
  - identifier_name
  - implicit_getter
  - implicit_return
  - implicitly_unwrapped_optional
  - index_access_thievery
  - inert_defer
  - infixoperator_to_enum
  - inline_parameters
  - is_disjoint
  - joined_default_parameter
  - last_where
  - leading_whitespace
  - legacy_cggeometry_functions
  - legacy_constant
  - legacy_constructor
  - legacy_hashing
  - legacy_multiple
  - legacy_nsgeometry_functions
  - legacy_objc_type
  - legacy_random
  - line_length
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - macro_spacing
  - mark
  - matched_docs
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - multiple_closures_with_trailing_closure
  - mutating_delegate_protocol
  - name_already_used
  - nested_parentheses
  - never_force_unwrap
  - no_extension_access_modifier
  - no_grouping_extension
  - noninitial_header_in_grouped_imports
  - nslocalizedstring_key
  - nslocalizedstring_require_bundle
  - number_separator
  - object_literal
  - opening_brace
  - operator_usage_whitespace
  - operator_whitespace
  - optional_enum_case_matching
  - optional_data_string_conversion
  - orphaned_task
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - period_spacing
  - prefer_filter_map
  - prefer_keyword_match
  - prefer_nempty
  - prefer_nil_coalescing
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prefixed_toplevel_constant
  - primary_associated_types
  - private_action
  - private_outlet
  - private_subject
  - private_unit_test
  - prohibited_interface_builder
  - prohibited_super_call
  - property_modifiers
  - protocol_property_accessors_order
  - raw_value_equatable
  - reduce_into
  - redundant_@objc_attribute
  - redundant_discardable_let
  - redundant_optional_initialization
  - redundant_set_access_control
  - redundant_string_enum_value
  - redundant_type_annotation
  - required_deinit
  - required_enum_cases
  - return_value_from_do_catch
  - returning_whitespace
  - reverse_for
  - same_line_brace_and_parameter
  - self_binding_in_initializer
  - semicolon
  - serious_offending_comment
  - short_eventhandler
  - shorthand_argument
  - shorthand_optional_binding
  - single_test_class
  - sorted_enum_cases
  - sorted_first_last
  - sorted_imports
  - spacing_around_square_brackets
  - spare_parens
  - statement_position
  - static_operator
  - strict_fileprivate
  - string_literal_conversion
  - strong_iboutlet
  - switch_case_alignment
  - switch_case_on_newline
  - syntactic_sugar
  - test_case_accessibility
  - todo
  - toggle_bool
  - trailing_closure
  - trailing_comma
  - trailing_newline
  - trailing_semicolon
  - trailing_whitespace
  - type_contents_order
  - type_name
  - unneeded_break_in_switch
  - unneeded_parentheses_in_closure_argument
  - unneeded_synthesized_initializer
  - unhandled_throwing_task
  - unneeded_override
  - unified_linker
  - unused_capture_list
  - unused_closure_parameter
  - unused_control_flow_label
  - unused_enumerated
  - unused_import
  - unused_optional_binding
  - unused_parameter
  - unused_setter_value
  - valid_ibinspectable
  - vertical_parameter_alignment
  - vertical_parameter_alignment_on_call
  - vertical_whitespace
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - void_return
  - weak_delegate
  - xct_config_threshold
  - xctfail_message
  - yoda_condition

disabled_rules:
  - prohibited_super_call
  - nslocalizedstring_require_bundle

opt_in_rules:
  - explicit_acl
  - explicit_type_interface
  - missing_docs
  - strict_fileprivate

excluded:
  - .build/
  - build/
  - Pods/
  - .swiftpm/

line_length:
  warning: 100
  error: 120

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

closure_body_length:
  warning: 30
  error: 60

function_parameter_count:
  warning: 5
  error: 8

large_tuple:
  warning: 3
  error: 5

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  allowed_symbols: ["_"]
  excluded:
    - id
    - x
    - y
    - z

force_cast: warning
force_try: warning
force_unwrapping: error
implicit_return:
  included:
    - closure
    - function
    - getter

implicit_getter: warning
redundant_discardable_let: error
redundant_optional_initialization: error
redundant_string_enum_value: error
redundant_type_annotation: error

trailing_comma:
  mandatory_trailing_comma: false

vertical_whitespace:
  max_empty_lines: 2

mark:
  regex: ^(MARK|TODO|FIXME|WARNING):\s+
