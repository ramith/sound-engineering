# Semgrep safety rules for AdaptiveSound.
#
# Run:  semgrep scan --config .semgrep.yml --error   (see `make lint` / strict-gate)
#
# WHY these rules and not the guide's AST rules: semgrep's `swift`/`cpp` AST parsers are
# experimental and unusable here — the Swift parser false-matches plain `try`/`as` (1200+
# bogus hits), and `cpp` mode doesn't even scan .mm (where all the DSP/CoreAudio bridge code
# lives). So every rule below uses `pattern-regex` on tokens that never appear in normal
# comments/strings, and the C++ bans use `languages: [generic]` + an explicit include list
# (verified to scan .mm) so they actually see the bridge code.
#
# DIVISION OF LABOUR:
#   * Swift force-try/force-cast: also caught by SwiftLint (force_try/force_cast = error under
#     `--strict`); kept here as a cheap, config-independent second net.
#   * C++ unbounded string funcs + thread detach: the one class NOT cleanly covered by
#     clang-tidy's enabled set, -Werror, or cppcheck — this is semgrep's load-bearing job.
#     (Memory/UB/race safety stays with clang-tidy + -Werror + ASan/UBSan/TSan; raw new/delete
#     at the reviewed opaque-handle C-ABI boundary is intentional and covered by
#     `make sanitize-library-store`.)
#   * Swift navigation-title (L5): banned — the app owns the window chrome (no native titlebar
#     text), so titles go in-content via ScreenHeader (UI/Shell/ScreenHeader.swift). A companion
#     "no window-sizing .frame(minWidth/minHeight)" ban was CONSIDERED and REJECTED: window
#     sizing is structurally owned by AppShell + WindowMinSize, but many legitimate component
#     frames (device pill, scrubber track, visualizer surface, preset sheet) use minWidth/
#     minHeight, so a token regex would be a false-positive machine — and the ContentView bug it
#     targeted isn't even under UI/. Enforced by review + the AppShell/WindowMinSize ownership.
#
# Reviewed exceptions use a narrow `// nosemgrep: <rule-id>` with the PERMANENT/TEMP + reason
# annotation enforced by scripts/check-suppressions.sh.
rules:
  - id: swift-no-force-try
    languages: [swift]
    severity: ERROR
    message: "Do not use try!. Handle the error (do/catch, try?, or propagate)."
    pattern-regex: '\btry!'

  - id: swift-no-force-cast
    languages: [swift]
    severity: ERROR
    message: "Do not use as!. Use conditional casting (as?) and handle nil."
    pattern-regex: '\bas!'

  - id: swift-no-navigation-title
    languages: [swift]
    severity: ERROR
    message: >-
      Do not use the navigation-title modifier — this app owns the window chrome (there is no
      native titlebar text to set). Put titles in-content via ScreenHeader
      (Sources/AdaptiveSound/UI/Shell/ScreenHeader.swift).
    pattern-regex: '\.navigationTitle'

  - id: cpp-no-unsafe-string-fn
    languages: [generic]
    severity: ERROR
    message: >-
      Unbounded C string function. Use a bounds-checked alternative: snprintf (with size),
      strlcpy/strlcat, std::string, or std::span.
    paths:
      include: ['*.c', '*.cc', '*.cpp', '*.mm', '*.h', '*.hpp']
    pattern-regex: '\b(strcpy|strcat|sprintf|vsprintf|stpcpy|gets)\s*\('

  - id: cpp-no-thread-detach
    languages: [generic]
    severity: ERROR
    message: "Do not detach threads. Use std::jthread or structured ownership (Audio Workgroups / GCD)."
    paths:
      include: ['*.c', '*.cc', '*.cpp', '*.mm', '*.h', '*.hpp']
    pattern-regex: '\.detach\s*\('

  # --- S10.7 layer-policy tripwires (docs/sprints/s10-7-liquid-glass-design.md §3.1/§3.2/§7 R1).
  # Drift nets, not security boundaries (same posture as the migrator grep): helper indirection
  # and legal-token recomposition can evade regexes — review owns that seam (design §7.4-1).
  # The four DEFINITION files (DesignSystem, DesignSystemGlass, Color+Brand, SpectrumColorPalette)
  # are the only exceptions — they are where color/material IS defined.

  - id: ui-no-adhoc-material
    languages: [swift]
    severity: ERROR
    message: >-
      Backdrop-sampling material outside the token layer. App glass-look surfaces are
      token-governed fills via .glassPanel(_:in:) (design §3.1 Regime B); the ONE sanctioned
      Material use (a transient overlay with variable content genuinely beneath) is the
      .overlay role inside DesignSystemGlass.swift. Declare a role, don't paint a material.
    paths:
      include: ['Sources/AdaptiveSound']
      exclude: ['DesignSystem.swift', 'DesignSystemGlass.swift', 'Color+Brand.swift', 'SpectrumColorPalette.swift']
    pattern-regex: '\.(ultraThin|thin|regular|thick|ultraThick)Material\b|\bMaterial\.|\bNSVisualEffectView\b|\.background\(\s*\.bar\b'

  - id: no-liquid-glass-api
    languages: [swift]
    severity: ERROR
    message: >-
      Liquid Glass API use is FROZEN for S10.7 — no app surface has variable content beneath
      it (design §3.1 placement test), so glassEffect would be cited "ghost glass". This rule
      is NEVER suppressed: adopting real glass means EDITING THIS RULE in the same PR as the
      design review that sanctions the under-content surface (see DesignSystemGlass.swift's
      header). Suppression = hack; rule edit + design review = policy evolution.
    paths:
      include: ['Sources']
    pattern-regex: '\.glassEffect(ID|Union|Transition)?\s*\(|\bGlassEffectContainer\b|\bNSGlassEffectView\b|buttonStyle\(\s*\.glass'

  - id: ui-no-color-literal
    languages: [swift]
    severity: ERROR
    message: >-
      Hand-painted color in a view. All color comes from DesignTokenKit data via DesignSystem
      tokens (light+dark pairs, permanently contrast-audited by R4) so appearance, Reduce
      Transparency, and Increase Contrast stay correct everywhere. Add/extend a Palette token
      instead. (Color.clear is deliberately allowed — absence of paint, not a color; hierarchical
      styles like .secondary are vibrancy styles, not colors, and are also fine.)
    paths:
      include: ['Sources/AdaptiveSound']
      exclude: ['DesignSystem.swift', 'DesignSystemGlass.swift', 'Color+Brand.swift', 'SpectrumColorPalette.swift']
    pattern-either:
      - pattern-regex: '\b(Color|NSColor)\(\s*(\.sRGB\s*,\s*)?(srgbRed|calibratedRed|deviceRed|red|white|hue)\s*:|#colorLiteral|\bColor\(\s*named:|\bColor\(\s*"'
      - pattern-regex: '\.(foregroundStyle|foregroundColor|fill|tint|stroke|strokeBorder|background)\(\s*(SwiftUI\.Color\.|Color\.|\.)(red|black|white|blue|green|orange|yellow|pink|purple|teal|mint|cyan|indigo|brown|gray)\b'
      - pattern-regex: '\.shadow\(\s*color:\s*(SwiftUI\.Color\.|Color\.|\.)(red|black|white|blue|green|orange|yellow|pink|purple|teal|mint|cyan|indigo|brown|gray)\b'

  - id: ui-no-appearance-branching
    languages: [swift]
    severity: ERROR
    message: >-
      Per-view appearance branching. Appearance is owned by the dynamic token layer (S9-T
      posture, enforced since S10.7) and by the .glassPanel env->resolver shim in
      DesignSystemGlass.swift; forcing preferredColorScheme breaks follow-the-system. Use
      DesignSystem tokens.
    paths:
      include: ['Sources/AdaptiveSound']
      exclude: ['DesignSystemGlass.swift']
    pattern-regex: '\\\.colorScheme\b|\.preferredColorScheme\s*\(|NSApp\.appearance\s*='
